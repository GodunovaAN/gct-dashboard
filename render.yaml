services:
  - type: web
    name: gct-signature-dashboard
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/session

    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"

      - key: DATA_DIR
        value: ./data

      - key: APP_BASE_URL
        sync: false
      - key: ADMIN_EMAILS
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
